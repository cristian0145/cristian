<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵💖 De mi Cristian 🎵💖</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(circle at top,#ff7abf,#270021,#000);
    color:white;
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    overflow:hidden;
}

.contenedor{
    width:100%;
    height:100vh;
    padding:10px 14px 95px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin:5px 0 2px;
    color:#ffc1e3;
    text-shadow:0 0 15px #ff1493;
}

.subtitulo{
    margin:0 0 10px;
    color:#ffd6ec;
}

/* AUDIO */
audio{
    width:90%;
    max-width:400px;
    margin-bottom:20px;
}

/* VIDEOS PC */
.lado-video{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:120px;
    height:200px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 25px #ff69b4;
}

#video-izq{ left:4%; }
#video-der{ right:4%; }

/* KARAOKE */
.karaoke{
    width:90%;
    max-width:500px;
    height:55vh;
    overflow-y:auto;
    padding:15px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
}

.linea{
    opacity:.3;
    margin:8px 0;
}

.linea.activa{
    opacity:1;
    font-size:1.3em;
    text-shadow:0 0 10px #ff69b4;
}

/* BOTON */
.boton-volver{
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    background:#ff4f9a;
    padding:10px 15px;
    border-radius:20px;
    color:white;
    text-decoration:none;
}

/* 📱 CELULAR */
@media(max-width:768px){

    audio{
        margin-bottom:150px;
    }

    .lado-video{
        position:absolute;
        top:210px;
        transform:none;
        width:82px;
        height:120px;
    }

    #video-izq{ left:13%; }
    #video-der{ right:13%; }

    .karaoke{
        width:88%;
        height:38vh;
    }
}
</style>
</head>

const karaoke = document.getElementById("karaoke");
const audio = document.getElementById("audio");

letra.forEach((l,i)=>{
    let p=document.createElement("p");
    p.className="linea";
    p.textContent=l.texto;
    p.id="l"+i;
    karaoke.appendChild(p);
});

audio.addEventListener("timeupdate",()=>{
    let actual=0;

    for(let i=0;i<letra.length;i++){
        if(audio.currentTime>=letra[i].t){
            actual=i;
        }
    }

    document.querySelectorAll(".linea").forEach(l=>l.classList.remove("activa"));

    let activa=document.getElementById("l"+actual);
    if(activa){
        activa.classList.add("activa");
        activa.scrollIntoView({behavior:"smooth",block:"center"});
    }
});
